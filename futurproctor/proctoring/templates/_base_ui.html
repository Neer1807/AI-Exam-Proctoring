{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}FutureProctor{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />

  <!-- Central theme -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />

  {% block head_extra %}{% endblock %}
</head>
<body>
  <!-- Navbar -->
  <nav class="fp-navbar navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">
        <img src="{% static 'images/monitor_logo.png' %}" alt="FutureProctor" class="fp-logo" />
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#fpNavbar" aria-controls="fpNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="fpNavbar">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link fp-navlink" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link fp-navlink" href="#">About</a></li>
          <li class="nav-item"><a class="nav-link fp-navlink" href="#">Contact</a></li>

          <li class="nav-item ms-lg-2">
            <a class="btn fp-btn fp-btn-primary" href="{% url 'login' %}">Login</a>
          </li>
          <li class="nav-item">
            <a class="btn fp-btn fp-btn-outline" href="{% url 'registration' %}">Register</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="fp-main">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="fp-footer">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-12 col-lg-6 text-center text-lg-start">
          <span class="fp-muted">&copy; 2025 FutureProctor. All Rights Reserved.</span>
        </div>
        <div class="col-12 col-lg-6 text-center text-lg-end mt-3 mt-lg-0">
          <a class="fp-footer-link" href="#">Privacy</a>
          <span class="fp-dot">•</span>
          <a class="fp-footer-link" href="#">Terms</a>
          <span class="fp-dot">•</span>
          <a class="fp-footer-link" href="#">Support</a>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  {% block scripts %}{% endblock %}
</body>
</html>
